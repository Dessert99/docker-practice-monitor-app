services:
  # 1. 우리의 모니터링 앱 컨테이너
  monitor-app:
    build: . # 현재 폴더의 Dockerfile을 읽어서 이미지를 새로 빌드합니다.
    volumes:
      - ./logs:/app/logs # 3단계에서 했던 볼륨 마운트 설정입니다.
    # 주의: 여기서 ports(8080:8080) 구문이 빠졌습니다! (이유는 아래에 설명)

  # 2. 문지기 역할을 할 Nginx 컨테이너
  nginx:
    image: nginx:alpine # Nginx 공식 이미지를 가져와서 씁니다.
    ports:
      - "80:80" # 외부의 80번 포트 요청을 Nginx 컨테이너의 80번으로 받습니다.
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf # 방금 만든 Nginx 설정 파일을 컨테이너 내부에 덮어씌웁니다.
    depends_on:
      - monitor-app # monitor-app이 먼저 켜진 후에 Nginx가 켜지도록 순서를 잡습니다.
