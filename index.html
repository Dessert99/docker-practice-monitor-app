<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>서버 상태 대시보드</title>
        <style>
            body {
                font-family: sans-serif;
                text-align: center;
                padding: 50px;
                background-color: #f4f4f9;
            }
            .card {
                background: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                display: inline-block;
                text-align: left;
            }
            h1 {
                color: #333;
            }
            p {
                font-size: 18px;
                color: #555;
            }
            span {
                font-weight: bold;
                color: #007bff;
            }
        </style>
    </head>
    <body>
        <h1>🖥️ 실시간 서버 상태 대시보드</h1>
        <div class="card">
            <p>호스트 이름: <span id="hostname">로딩 중...</span></p>
            <p>전체 메모리: <span id="totalMem">로딩 중...</span></p>
            <p>남은 메모리: <span id="freeMem">로딩 중...</span></p>
            <p>가동 시간: <span id="uptime">로딩 중...</span></p>
        </div>

        <script>
            async function fetchStatus() {
                try {
                    // 백엔드 API로 데이터를 요청합니다.
                    const response = await fetch('/api/status');
                    const data = await response.json();

                    document.getElementById('hostname').textContent = data.hostname;
                    document.getElementById('totalMem').textContent = data.totalMemory;
                    document.getElementById('freeMem').textContent = data.freeMemory;
                    document.getElementById('uptime').textContent = data.uptime;
                } catch (error) {
                    console.error('데이터를 불러오지 못했습니다.', error);
                }
            }

            // 1초(1000ms)마다 데이터 갱신
            setInterval(fetchStatus, 1000);
            fetchStatus();
        </script>
    </body>
</html>
